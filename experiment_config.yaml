experiment:
  c0: 0.7
  c1_values: [0.2, 0.4, 0.6, 0.8]
  noise_types: ["gaussian", "rician"]
  n_realizations: 10
  sigma: 0.05
  base_seed: 42

lambda0:
  min: 0.004
  max: 0.02
  samples: 20

lambda1:
  min: 0.004
  max: 0.02
  samples: 20

t:
  min: 0.05
  max: 3.0
  samples: 32

solver:
  methods: ["gd", "gn", "ep"]
  mu_init: 0.5
  outer_steps: 100
  gd_lr: 0.12
  ep_lr: 0.02
  ep_beta: 1.0e-5
  lower_max_iter: 300
  lower_tol: 1.0e-9
  progress: false

parallel:
  enabled: true
  num_workers: 64
  chunksize: 1
  maxtasksperchild: 100
  torch_num_threads: 1

tracking:
  root_dir: "results/experiments"
  experiment_id: null
  config_snapshot_name: "config.yaml"
  summary_every: 1

output:
  jsonl_name: "sweep.jsonl"
  json_name: "sweep.json"
  resume: true
  finalize_json: true
